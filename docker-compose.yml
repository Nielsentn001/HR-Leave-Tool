services:
  db:
    image: postgres:16-alpine
    container_name: leave_management_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: leave_user
      POSTGRES_PASSWORD: leave_password
      POSTGRES_DB: leave_management
    ports:
      - "5432:5432"
    volumes:
      - leave_db_data:/var/lib/postgresql/data

volumes:
  leave_db_data:
